<!DOCTYPE html>
<html>

<head>
	<title>Page des marées</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Mise en place du code pour l'affichage de la carte avec Leaflet -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="">
		</script>

	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			padding: 0;
			height: 100%;
			overflow: hidden;
			font-family: sans-serif;
		}

		body {
			display: flex;
			flex-direction: column;
		}

		#map {
			width: 100%;
			height: 40vh;
			flex-shrink: 0;
		}

		#shom-container {
			flex: 1;
			width: 100%;
			min-height: 0;
			background: white;
			border-top: 1px solid #ccc;
		}

		#shom-container iframe {
			width: 100%;
			height: 100%;
			border: 0;
			display: block;
		}
	</style>
</head>

<body>
	<!-- Hauteur largeur de carte -->
	<div id="map"></div>

	<!-- iframe SHOM global -->
	<div id="shom-container">

		<iframe id="shom-frame" src="shom.html?station=BOUCAU-BAYONNE"></iframe>

	</div>

	<script>
		// position de départ affichée sur la carte (latitude, longitude) et le niveau de zoom
		const map = L.map('map').setView([43.52732, -1.51483], 13);
		// ajout de la carte
		const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
			maxZoom: 19,
			attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
		}).addTo(map);

		function donneOrientationVent(orientationEnDegres) //f(x=)
		{
			//= 3x+8
			if (orientationEnDegres > 0 && orientationEnDegres < 90)
				return "NE"
			else if (orientationEnDegres >= 90 && orientationEnDegres < 180)
				return "SE"
			else if (orientationEnDegres >= 180 && orientationEnDegres < 270)
				return "SW"
			else
				return "NW"
		}

		const iframe = document.getElementById("shom-frame");
		// la popup qui s'affiche quand on clique sur un marqueur
		var popup = L.popup();

		(async () => {

			const res = await fetch("https://services.data.shom.fr/maregraphie/service/tidegauges");
			const data_all_stations = await res.json();

			// on parcourt toutes les stations de marée
			for (i = 0; i < data_all_stations.length; i++) {
				station_courante = data_all_stations[i];
				if (!station_courante.name.includes("VIGICRUES")) {
					// on ajoute un marqueur sur la carte
					var marker = L.marker([station_courante.latitude, station_courante.longitude]).addTo(map);
					// on stocke le nom de la station dans l'objet myData du marqueur pour pouvoir le récupérer lors du click
					marker.myData = {
						station: station_courante.name
					};

					// on dit que quand on clique sur le marqueur, on appelle la fonction onMarkerClick
					marker.on('click', onMarkerClick);
				}


			}
		})();

		async function onMarkerClick(e) {

			// met à jour le contenu des marées
			iframe.src = `shom.html?station=${encodeURIComponent(e.target.myData.station)}`;

			// on récupère la température de l'eau via l'API open-meteo
			const res_url_temperature = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${e.latlng.lat}&longitude=${e.latlng.lng}&hourly=sea_surface_temperature&current=sea_surface_temperature&timezone=Europe%2FBerlin`);
			console.log(res_url_temperature)
			const data_temperature = await res_url_temperature.json();

			//CLEMENT : recopier le code de temperature pour recuperer la hauteur de vagues....
			const res_url_wave_height = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${e.latlng.lat}&longitude=${e.latlng.lng}&hourly=wave_height&current=wave_height&timezone=Europe%2FBerlin`);
			console.log(res_url_wave_height)
			const data_wave_height = await res_url_wave_height.json();

			//VENT
			//https://api.open-meteo.com/v1/forecast?latitude=48.52732&longitude=-1.51483&hourly=wind_direction_180m&current=wind_direction_180mt&timezone=Europe%2FBerlin
			const res_url_wind_direction_180m = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${e.latlng.lat}&longitude=${e.latlng.lng}&hourly=wind_direction_180m&current=wind_direction_180mt&timezone=Europe%2FBerlin`);
			console.log(res_url_wind_direction_180m)
			const data_wind_direction_180m = await res_url_wind_direction_180m.json();

			// on affiche la popup avec les donnees recuperees
			popup
				.setLatLng(e.latlng)
				// CLEMENT : ajouter la hauteur de vagues dans le texte de la popup
				.setContent(`<b>${e.target.myData.station}</b><p>Température de l'eau: ${data_temperature.current.sea_surface_temperature}°C<br>Hauteur de vagues: ${data_wave_height.current.wave_height}m <br>Vent: ${donneOrientationVent(data_wind_direction_180m.current.wind_direction_180m)} (${data_wind_direction_180m.current.wind_direction_180m}°)`)
				.openOn(map)
		}



	</script>

</body>

</html>
