<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
		}
		body {
			display: flex;
			justify-content: center;
		}
		#vignette-wrapper {
			display: inline-block;
			transform-origin: top center;
		}
	</style>
</head>

<body>

	<div id="vignette-wrapper">
		<script>
			const params = new URLSearchParams(location.search);
			const station = params.get("station");

			document.write(
				"<script src='https://services.data.shom.fr/hdm/vignette/grande/"
				+ station +
				"?locale=fr'><\/script>"
			);
		</script>
	</div>

	<script>
		function fitVignette() {
				const wrapper = document.getElementById('vignette-wrapper');
				const scaleX = window.innerWidth  / wrapper.scrollWidth;
				const scaleY = window.innerHeight / wrapper.scrollHeight;
				const scale  = Math.min(scaleX, scaleY, 1);
				wrapper.style.transform = `scale(${scale})`;
			}

		window.addEventListener('load', fitVignette);
		window.addEventListener('resize', fitVignette);
	</script>

</body>

</html>
